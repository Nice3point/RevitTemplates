name: Publish wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: publish-wiki
  cancel-in-progress: true

jobs:
  publish:
    name: Publish wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Publish wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v5
        with:
          path: docs/
          disable-empty-commits: true
